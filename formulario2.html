<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form id="Formulario_id">
        <label for="">Nombre</label>
        <br>
        <input type="text" id="nombre_id" placeholder="ingrese su Nombre">
        <div id="ErrorNombre" class="Error"> </div>
        <br>
        <label for="">Correo Electronico</label>
        <br>
        <input type="text" id="correo_id" placeholder="ingrese su Correo">
        <div id="ErrorCorreo" class="Error"> </div>
        <br>
        <label for="">Ingrese contraseña</label>
        <br>
        <input type="text" id="contrasenia_id" placeholder="ingrese su Contraseña">
        <div id="ErrorContrasenia" class="Error"> </div>
        <br>
        <label for="">confirme su contraseña</label>
        <br>
        <input type="text" id="ConfirmarContrasenia_id" placeholder="ingrese su Contraseña">
        <br>
        <br>
        <button type="submit">Enviar</button>
    </form>

</body>
</html>
